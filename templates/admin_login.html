<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>

    <a href="/"
       class="{{ 'active' if active_page == 'home' else '' }}">
       Home
    </a>

    <a href="/about"
       class="{{ 'active' if active_page == 'about' else '' }}">
       About
    </a>

    <a href="/register"
       class="{{ 'active' if active_page == 'register' else '' }}">
       Register
    </a>

    {% if session.get('admin') %}

        <a href="/dashboard"
           class="{{ 'active' if active_page == 'dashboard' else '' }}">
           Dashboard
        </a>

        <a href="/volunteers"
           class="{{ 'active' if active_page == 'volunteers' else '' }}">
           Volunteers
        </a>

        <a href="/logout">Logout</a>

    {% else %}

        <a href="/admin"
           class="{{ 'active' if active_page == 'admin' else '' }}">
           Admin
        </a>

    {% endif %}

</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

<h1>Admin Login</h1>

<form method="POST" action="/admin">

    <label>Username:</label>
    <input type="text" name="username" required>

    <label>Password:</label>
    <input type="password" name="password" required>

    <button type="submit">Login</button>

</form>

</body>
</html>
